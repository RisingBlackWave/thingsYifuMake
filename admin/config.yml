backend:
  name: github
  repo: RisingBlackWave/thingsYifuMake
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  commit_messages:
    create: "Create {{collection}} {{slug}}"
    update: "Update {{collection}} {{slug}}"
    delete: "Delete {{collection}} {{slug}}"

media_folder: "assets/projects"
public_folder: "assets/projects"
max_file_size: 5242880

collections:
  - name: "projects"
    label: "Projects"
    description: "All portfolio projects — edit text, tags, images"
    format: "json"
    files:
      - name: "project-list"
        label: "All Projects"
        file: "projects.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{fields.mode}} — {{fields.title}} ({{fields.year}})"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
                required: false
                hint: "One-line subtitle shown on hover and project page"

              - label: "Mode"
                name: "mode"
                widget: "select"
                options:
                  - { label: "Product", value: "Product" }
                  - { label: "Research", value: "Research" }
                  - { label: "Education", value: "Education" }
                  - { label: "Podcast", value: "Podcast" }

              - label: "Venue / Collab"
                name: "venue"
                widget: "string"
                required: false
                hint: "Conference, partner, or brand (e.g. CHI 2026, UCL, ACII)"

              - label: "Visibility"
                name: "visibility"
                widget: "select"
                required: false
                default: "shown"
                hint: "Shown = visible, WIP = grey, Hidden = not displayed"
                options:
                  - { label: "Shown", value: "shown" }
                  - { label: "WIP (grey)", value: "wip" }
                  - { label: "Hidden", value: "hidden" }

              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "URL-friendly name and image folder name (e.g. dancing-pig)"

              - label: "Date"
                name: "date"
                widget: "string"
                required: false
                hint: "Display date (e.g. '2026', '03.2026', 'Spring 2024')"

              - label: "Year"
                name: "year"
                widget: "number"
                required: false
                value_type: "int"
                hint: "Used for sorting (number only)"

              - label: "Intro (short)"
                name: "intro"
                widget: "string"
                required: false
                hint: "One-line summary shown in list view before clicking (e.g. 'A robot that helps you learn clothes repair')"

              - label: "Description (full)"
                name: "desc"
                widget: "text"
                required: false
                hint: "Full project description — shown on project detail page"

              - label: "Awards"
                name: "awards"
                widget: "list"
                required: false
                hint: "Click Add to enter each award separately"
                allow_add: true
                collapsed: false
                fields:
                  - label: "Award Name"
                    name: "name"
                    widget: "string"
                    hint: "e.g. Best Paper Award, CHI 2026 Honourable Mention"

              - label: "Tags"
                name: "tags"
                widget: "list"
                required: false
                hint: "Comma-separated tags"

              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
                hint: "URL to paper, video, or external page"

              - label: "Preview Image"
                name: "previewImage"
                widget: "image"
                required: false
                hint: "Thumbnail (440x260). Upload or drag image here."

              - label: "Cover Image"
                name: "coverImage"
                widget: "image"
                required: false
                hint: "Hero image (1400x600). Upload or drag image here."

              - label: "Project Detail Images"
                name: "gallery"
                widget: "list"
                required: false
                hint: "Add images that show inside the project page (process shots, details, screenshots)"
                allow_add: true
                default: []
                field:
                  label: "Image"
                  name: "gallery"
                  widget: "image"

              - label: "Preview Video"
                name: "previewVideo"
                widget: "image"
                required: false
                hint: "Short looping video as cover (MP4). Upload or drag here."
                media_library:
                  allow_multiple: false

              - label: "Whisper"
                name: "whisper"
                widget: "string"
                required: false
