<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thingsYifuMake — Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e12;--card:#16161c;--border:#2a2a35;
  --text:#e8e4dd;--dim:#888;--accent:#7AB8E8;
  --designed:#E8C17A;--researched:#7AB8E8;--built:#7AE8C1;--taught:#E87A7A;--talked:#C17AE8;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6}
.editor-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:500;margin-bottom:4px}
.sidebar-header p{font-size:11px;color:var(--dim)}
.sidebar-list{overflow-y:auto;flex:1}
.sidebar-item{padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.sidebar-item:hover{background:rgba(255,255,255,.03)}
.sidebar-item.active{background:rgba(122,184,232,.08);border-left:3px solid var(--accent)}
.sidebar-item .mode-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-item .item-title{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item .item-wip{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.main-panel{flex:1;overflow-y:auto;padding:32px 48px 80px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);margin-bottom:12px;margin-top:32px}
.section-title:first-child{margin-top:0}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;border-radius:4px;transition:border-color .2s;resize:vertical}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{min-height:120px;line-height:1.7}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.checkbox-field{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.checkbox-field input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent)}
.checkbox-field label{font-size:13px;color:var(--text);margin:0;text-transform:none;letter-spacing:0}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{padding:4px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:3px;font-size:12px;display:flex;align-items:center;gap:6px}
.tag .tag-remove{cursor:pointer;color:var(--dim);font-size:10px}
.tag .tag-remove:hover{color:#E87A7A}
.tag-input{display:flex;gap:8px}
.tag-input input{flex:1}
.tag-input button{padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.image-instructions{padding:16px;background:rgba(122,184,232,.06);border:1px solid rgba(122,184,232,.15);border-radius:6px;margin-bottom:16px;font-size:12px;color:var(--dim);line-height:1.7}
.image-instructions code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:3px;font-size:11px;color:var(--accent)}
.image-instructions strong{color:var(--text)}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:12px}
.image-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.image-card img{width:100%;height:130px;object-fit:cover;display:block}
.image-card .image-info{padding:8px 10px}
.image-card .image-name{font-size:11px;color:var(--dim);word-break:break-all}
.image-card .image-role{font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:3px;margin-top:4px;display:inline-block}
.image-card .image-role.cover{background:rgba(232,193,122,.15);color:var(--designed)}
.image-card .image-role.preview{background:rgba(122,184,232,.15);color:var(--researched)}
.image-card .image-role.gallery{background:rgba(122,232,193,.1);color:var(--built)}
.image-empty{padding:40px;text-align:center;color:var(--dim);border:2px dashed var(--border);border-radius:8px;font-size:13px;line-height:1.8}
.btn-bar{position:fixed;bottom:0;left:280px;right:0;padding:16px 48px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;z-index:100}
.btn{padding:10px 24px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#9dd0f8}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(232,122,122,.15);color:#E87A7A;border:1px solid rgba(232,122,122,.2)}
.btn-danger:hover{background:rgba(232,122,122,.25)}
.save-status{font-size:12px;color:var(--dim);margin-left:auto}
.preview-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);text-decoration:none;padding:6px 12px;border:1px solid rgba(122,184,232,.2);border-radius:4px;transition:background .15s}
.preview-link:hover{background:rgba(122,184,232,.08)}
.empty-state{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--dim);font-size:15px;text-align:center;line-height:2}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:28px;width:420px;max-width:90vw}
.modal h2{font-size:16px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── BLOCK EDITOR ── */
.blocks-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.block-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px;
  position:relative;
  transition:border-color .15s, transform .15s
}
.block-card.drag-over{border-color:var(--accent);transform:scale(1.01)}
.block-card.dragging{opacity:.4}
.block-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
  cursor:grab;
  user-select:none
}
.block-head:active{cursor:grabbing}
.block-icon{
  width:28px;height:28px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  background:rgba(122,184,232,.1);
  color:var(--accent);
  flex-shrink:0
}
.block-icon.t-text{background:rgba(232,193,122,.12);color:#E8C17A}
.block-icon.t-image{background:rgba(122,184,232,.12);color:#7AB8E8}
.block-icon.t-image-pair{background:rgba(122,232,193,.12);color:#7AE8C1}
.block-icon.t-gallery{background:rgba(193,122,232,.12);color:#C17AE8}
.block-icon.t-video{background:rgba(232,122,122,.12);color:#E87A7A}
.block-icon.t-tags{background:rgba(255,255,255,.08);color:var(--text)}
.block-icon.t-spacer{background:rgba(255,255,255,.04);color:var(--dim)}
.block-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--dim);flex:1
}
.block-controls{display:flex;gap:4px}
.block-btn{
  width:24px;height:24px;border-radius:3px;
  background:transparent;border:1px solid var(--border);
  color:var(--dim);cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s, color .15s
}
.block-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.block-btn.del:hover{background:rgba(232,122,122,.15);color:#E87A7A;border-color:rgba(232,122,122,.3)}
.block-body{display:flex;flex-direction:column;gap:8px}
.block-body textarea{
  width:100%;padding:8px 10px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:13px;
  border-radius:4px;resize:vertical;min-height:60px;line-height:1.6
}
.block-body input[type=text]{
  width:100%;padding:7px 10px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:12px;
  border-radius:4px
}
.block-body select{
  padding:6px 10px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:11px;
  border-radius:4px
}
.block-fields-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.block-fields-row label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.block-img-pick{display:flex;gap:8px;align-items:center}
.block-img-pick img{
  width:60px;height:40px;object-fit:cover;
  border-radius:3px;background:#000;
  border:1px solid var(--border)
}
.block-img-pick input{flex:1}
.block-pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.block-pair-grid .pair-side{
  background:rgba(0,0,0,.15);
  padding:8px;border-radius:4px;
  display:flex;flex-direction:column;gap:6px
}
.block-pair-grid .pair-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.block-gallery-list{display:flex;flex-direction:column;gap:6px}
.block-gallery-row{
  display:flex;gap:6px;align-items:center;
  background:rgba(0,0,0,.15);
  padding:6px;border-radius:3px
}
.block-gallery-row img{width:40px;height:28px;object-fit:cover;border-radius:2px;background:#000}
.block-gallery-row input{flex:1;font-size:11px}
.block-gallery-row .gal-rm{width:22px;height:22px;cursor:pointer;color:#E87A7A;background:transparent;border:1px solid rgba(232,122,122,.2);border-radius:3px}

.add-block-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:12px;
  background:rgba(255,255,255,.02);
  border:1px dashed var(--border);
  border-radius:6px;
  margin-bottom:16px
}
.add-block-btn{
  padding:8px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--text);cursor:pointer;
  font-size:11px;border-radius:4px;
  display:flex;align-items:center;gap:6px;
  transition:background .15s, border-color .15s
}
.add-block-btn:hover{background:rgba(122,184,232,.1);border-color:var(--accent)}
.convert-btn{
  padding:10px 16px;
  background:rgba(122,232,193,.1);
  border:1px solid rgba(122,232,193,.3);
  color:#7AE8C1;cursor:pointer;
  font-size:12px;border-radius:4px;
  margin-bottom:12px
}
.convert-btn:hover{background:rgba(122,232,193,.18)}
.blocks-empty{
  padding:24px;text-align:center;
  color:var(--dim);font-size:12px;line-height:1.7;
  border:1px dashed var(--border);border-radius:6px;margin-bottom:12px
}
</style>
</head>
<body>
<div class="editor-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>thingsYifuMake Editor</h1>
      <p>Edit projects, manage images, save to projects.json</p>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-primary" style="font-size:11px;padding:6px 12px" onclick="addNewProject()">+ New Project</button>
        <a href="index.html" target="_blank" class="preview-link" style="font-size:11px;padding:6px 12px">Preview Site</a>
      </div>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>
  <div class="main-panel" id="main-panel">
    <div class="empty-state" id="empty-state">
      Select a project from the sidebar to edit<br>
      <span style="font-size:12px;color:var(--dim)">or click + New Project to create one</span>
    </div>
    <div id="editor-form" style="display:none"></div>
  </div>
</div>
<div class="btn-bar" id="btn-bar" style="display:none">
  <button class="btn btn-primary" onclick="saveAll()">Save projects.json</button>
  <button class="btn btn-secondary" onclick="downloadJSON()">Download JSON</button>
  <button class="btn btn-danger" onclick="deleteProject()">Delete Project</button>
  <span class="save-status" id="save-status"></span>
</div>
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="field">
      <label>Title</label>
      <input id="new-title" placeholder="Project title">
    </div>
    <div class="field">
      <label>Mode</label>
      <select id="new-mode">
        <option value="Designed">Designed</option>
        <option value="Researched">Researched</option>
        <option value="Built">Built</option>
        <option value="Taught">Taught</option>
        <option value="Talked">Talked</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewProject()">Create</button>
    </div>
  </div>
</div>
<script>
let projects=[];let selectedIdx=-1;let projectImages={};let dirty=false;
const COLORS={Product:'#E8C17A',Research:'#7AB8E8',Education:'#E87A7A',Podcast:'#C17AE8'};

async function loadProjects(){
  try{const r=await fetch('projects.json?t='+Date.now());const data=await r.json();projects=Array.isArray(data)?data:data.items||[];renderSidebar()}
  catch(e){alert('Failed to load projects.json: '+e.message)}
}

async function scanImages(slug){
  const imgs=[];
  const extensions=['jpg','jpeg','png','gif','webp'];
  const names=['cover','preview','01','02','03','04','05','06','07','08','09','10','hero','main','detail-1','detail-2','detail-3'];
  for(const name of names){for(const ext of extensions){
    const path='assets/projects/'+slug+'/'+name+'.'+ext;
    try{const r=await fetch(path,{method:'HEAD'});if(r.ok)imgs.push({name:name+'.'+ext,path:path})}catch(e){}
  }}
  return imgs;
}

loadProjects();

function renderSidebar(){
  const list=document.getElementById('sidebar-list');list.innerHTML='';
  ['Product','Research','Education','Podcast'].forEach(mode=>{
    const mp=projects.filter(p=>p.mode===mode);if(!mp.length)return;
    const h=document.createElement('div');
    h.style.cssText='padding:8px 20px;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:'+COLORS[mode]+';opacity:.6;margin-top:8px';
    h.textContent=mode+' ('+mp.length+')';list.appendChild(h);
    mp.forEach(p=>{
      const idx=projects.indexOf(p);
      const item=document.createElement('div');
      item.className='sidebar-item'+(idx===selectedIdx?' active':'');
      item.innerHTML='<div class="mode-dot" style="background:'+COLORS[p.mode]+'"></div><div class="item-title">'+p.title+'</div>'+(p.wip?'<span class="item-wip">wip</span>':'');
      item.addEventListener('click',()=>selectProject(idx));list.appendChild(item);
    });
  });
}

async function selectProject(idx){
  if(selectedIdx>=0)collectFormData();
  selectedIdx=idx;renderSidebar();
  document.getElementById('empty-state').style.display='none';
  document.getElementById('editor-form').style.display='block';
  document.getElementById('btn-bar').style.display='flex';
  document.getElementById('main-panel').scrollTop=0;
  const p=projects[idx];const color=COLORS[p.mode];
  const images=await scanImages(p.slug);projectImages[p.slug]=images;
  const form=document.getElementById('editor-form');
  form.innerHTML='<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
    +'<div style="width:12px;height:12px;border-radius:50%;background:'+color+'"></div>'
    +'<span style="font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:'+color+'">'+p.mode+'</span>'
    +(p.wip?'<span style="font-size:10px;color:var(--dim);border:1px solid var(--border);padding:2px 8px;border-radius:3px">WIP</span>':'')
    +'</div>'
    +'<div class="section-title">Basic Info</div>'
    +'<div class="field"><label>Title</label><input id="f-title" value="'+esc(p.title)+'" oninput="markDirty()"></div>'
    +'<div class="field"><label>Subtitle</label><input id="f-subtitle" value="'+esc(p.subtitle||'')+'" placeholder="One-line subtitle" oninput="markDirty()"></div>'
    +'<div class="field"><label>Slug (folder name)</label><input id="f-slug" value="'+esc(p.slug)+'" style="color:var(--dim)" oninput="markDirty()"></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Mode</label><select id="f-mode" onchange="markDirty()">'+['Product','Research','Education','Podcast'].map(m=>'<option value="'+m+'" '+(p.mode===m?'selected':'')+'>'+m+'</option>').join('')+'</select></div>'
    +'<div class="field"><label>Year</label><input id="f-year" type="number" value="'+(p.year||'')+'" placeholder="e.g. 2026" oninput="markDirty()"></div>'
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Date (display)</label><input id="f-date" value="'+esc(p.date||'')+'" placeholder="e.g. 03.2026, Spring 2024" oninput="markDirty()"></div>'
    +'<div class="field"><label>Venue / Collab</label><input id="f-venue" value="'+esc(p.venue||'')+'" placeholder="e.g. CHI 2026, UCL, ACII" oninput="markDirty()"></div>'
    +'</div>'
    +'<div class="checkbox-field"><input type="checkbox" id="f-wip" '+(p.wip?'checked':'')+' onchange="markDirty()"><label for="f-wip">Work in Progress (WIP)</label></div>'
    +'<div class="section-title">Intro & Description</div>'
    +'<div class="field"><label>Intro (short — shown in list view)</label><input id="f-intro" value="'+esc(p.intro||'')+'" placeholder="One-line summary, e.g. A robot that helps you learn clothes repair" oninput="markDirty()"></div>'
    +'<div class="field"><label>Description (full — shown on project page)</label><textarea id="f-desc" rows="8" placeholder="Full project description..." oninput="markDirty()">'+esc(p.desc||'')+'</textarea></div>'
    +'<div class="section-title">Page Layout (Blocks)</div>'
    +'<div id="blocks-section"></div>'
    +'<div class="section-title">Link</div>'
    +'<div class="field"><label>External Link</label><input id="f-link" value="'+esc(p.link||'')+'" placeholder="https://..." oninput="markDirty()"></div>'
    +'<div class="section-title">Awards</div>'
    +'<div class="tags-wrap" id="awards-wrap">'+(p.awards||[]).map(a=>'<span class="tag" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)">'+esc(typeof a==='string'?a:a.label||a)+'<span class="tag-remove" onclick="removeAward(this)">x</span></span>').join('')+'</div>'
    +'<div class="tag-input"><input id="f-new-award" placeholder="Add award (e.g. Best Paper, CHI 2026)..." onkeypress="if(event.key===\'Enter\'){event.preventDefault();addAward()}"><button onclick="addAward()">Add</button></div>'
    +'<div class="section-title">Tags</div>'
    +'<div class="tags-wrap" id="tags-wrap">'+(p.tags||[]).map(t=>'<span class="tag">'+esc(t)+'<span class="tag-remove" onclick="removeTag(this)">x</span></span>').join('')+'</div>'
    +'<div class="tag-input"><input id="f-new-tag" placeholder="Add tag..." onkeypress="if(event.key===\'Enter\'){event.preventDefault();addTag()}"><button onclick="addTag()">Add</button></div>'
    +'<div class="section-title">Gallery Images</div>'
    +'<div class="tags-wrap" id="gallery-wrap">'+(p.gallery||[]).map((g,gi)=>{const src=typeof g==='string'?g:g.src;return '<span class="tag" style="background:rgba(122,232,193,.08);border-color:rgba(122,232,193,.2)"><img src="'+esc(src)+'" style="width:40px;height:25px;object-fit:cover;border-radius:2px;margin-right:4px;vertical-align:middle">'+esc(src.split('/').pop())+'<span class="tag-remove" onclick="removeGallery(this,'+gi+')">x</span></span>'}).join('')+'</div>'
    +'<div class="tag-input"><input id="f-new-gallery" placeholder="Image path (e.g. assets/projects/'+esc(p.slug)+'/01.jpg)..." onkeypress="if(event.key===\'Enter\'){event.preventDefault();addGalleryPath()}"><button onclick="addGalleryPath()">Add Path</button></div>'
    +'<div class="section-title">Images</div>'
    +'<div class="image-instructions">'
    +'<strong>How images work:</strong><br>'
    +'Drop image files into <code>assets/projects/'+esc(p.slug)+'/</code><br>'
    +'Name them: <code>cover.jpg</code> (hero image), <code>preview.jpg</code> (thumbnail), <code>01.jpg</code> to <code>10.jpg</code> (gallery)<br>'
    +'Supported: jpg, png, gif, webp. Then click <strong>Scan Images</strong> below.'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
    +'<button class="btn btn-secondary" style="font-size:11px" onclick="rescanImages()">Scan Images</button>'
    +'</div>'
    +(images.length?'<div class="image-grid">'+images.map(function(img){return '<div class="image-card">'
    +'<img src="'+img.path+'?t='+Date.now()+'" alt="'+img.name+'">'
    +'<div class="image-info">'
    +'<div class="image-name">'+img.name+'</div>'
    +'<div class="image-role '+(img.name.startsWith('cover')?'cover':img.name.startsWith('preview')?'preview':'gallery')+'">'
    +(img.name.startsWith('cover')?'Cover Image':img.name.startsWith('preview')?'Preview':'Gallery')
    +'</div></div></div>'}).join('')+'</div>'
    :'<div class="image-empty">No images found in assets/projects/'+esc(p.slug)+'/<br>Add images named: cover.jpg, preview.jpg, 01.jpg, 02.jpg, etc.</div>')
    +'<div class="section-title">Asset Paths (auto-detected or manual)</div>'
    +'<div class="field"><label>Preview Image</label><input id="f-previewImage" value="'+esc(p.previewImage||'')+'" placeholder="auto from preview.jpg or set manually" oninput="markDirty()"></div>'
    +'<div class="field"><label>Cover Image</label><input id="f-coverImage" value="'+esc(p.coverImage||'')+'" placeholder="auto from cover.jpg or set manually" oninput="markDirty()"></div>'
    +'<div class="field"><label>Preview Video</label><input id="f-previewVideo" value="'+esc(p.previewVideo||'')+'" placeholder="path to loop.mp4 or video URL" oninput="markDirty()"></div>'
    +'<div style="height:80px"></div>';
  // Render the blocks editor section
  setTimeout(function(){renderBlocksEditor(p)},0);
  if(images.length){
    var ci=images.find(function(i){return i.name.startsWith('cover')});
    var pi=images.find(function(i){return i.name.startsWith('preview')});
    if(ci&&!p.coverImage){document.getElementById('f-coverImage').value=ci.path;markDirty()}
    if(pi&&!p.previewImage){document.getElementById('f-previewImage').value=pi.path;markDirty()}
  }
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function collectFormData(){
  if(selectedIdx<0)return;var p=projects[selectedIdx];
  var get=function(id){var el=document.getElementById(id);return el?el.value:''};
  p.title=get('f-title');p.subtitle=get('f-subtitle')||null;p.slug=get('f-slug');p.mode=get('f-mode');
  p.year=get('f-year')?parseInt(get('f-year')):null;p.date=get('f-date')||null;p.venue=get('f-venue')||null;p.intro=get('f-intro')||null;p.desc=get('f-desc');p.link=get('f-link')||null;
  var wipEl=document.getElementById('f-wip');p.wip=wipEl?wipEl.checked:false;
  p.previewImage=get('f-previewImage')||null;p.coverImage=get('f-coverImage')||null;p.previewVideo=get('f-previewVideo')||null;
  var tagEls=document.querySelectorAll('#tags-wrap .tag');
  p.tags=Array.from(tagEls).map(function(el){return el.textContent.replace('x','').trim()});
  var awardEls=document.querySelectorAll('#awards-wrap .tag');
  p.awards=Array.from(awardEls).map(function(el){return el.textContent.replace('x','').trim()});
  if(!p.awards.length)delete p.awards;
  var galleryEls=document.querySelectorAll('#gallery-wrap .tag');
  p.gallery=Array.from(galleryEls).map(function(el){var img=el.querySelector('img');return img?img.src.replace(window.location.origin+'/',''):el.textContent.replace('x','').trim()});
  if(!p.gallery.length)delete p.gallery;
}

function addTag(){var input=document.getElementById('f-new-tag');var val=input.value.trim();if(!val)return;
  var wrap=document.getElementById('tags-wrap');var tag=document.createElement('span');tag.className='tag';
  tag.innerHTML=esc(val)+'<span class="tag-remove" onclick="removeTag(this)">x</span>';wrap.appendChild(tag);input.value='';markDirty()}
function removeTag(el){el.parentElement.remove();markDirty()}

function addAward(){var input=document.getElementById('f-new-award');var val=input.value.trim();if(!val)return;
  var wrap=document.getElementById('awards-wrap');var tag=document.createElement('span');tag.className='tag';
  tag.style.cssText='background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)';
  tag.innerHTML=esc(val)+'<span class="tag-remove" onclick="removeAward(this)">x</span>';wrap.appendChild(tag);input.value='';markDirty()}
function removeAward(el){el.parentElement.remove();markDirty()}

function addGalleryPath(){var input=document.getElementById('f-new-gallery');var val=input.value.trim();if(!val)return;
  var wrap=document.getElementById('gallery-wrap');var tag=document.createElement('span');tag.className='tag';
  tag.style.cssText='background:rgba(122,232,193,.08);border-color:rgba(122,232,193,.2)';
  tag.innerHTML='<img src="'+esc(val)+'" style="width:40px;height:25px;object-fit:cover;border-radius:2px;margin-right:4px;vertical-align:middle" onerror="this.style.display=\'none\'">'+esc(val.split('/').pop())+'<span class="tag-remove" onclick="removeGallery(this)">x</span>';
  wrap.appendChild(tag);input.value='';markDirty()}
function removeGallery(el){el.parentElement.remove();markDirty()}

async function rescanImages(){if(selectedIdx<0)return;selectProject(selectedIdx);showStatus('Rescanned images')}

function markDirty(){dirty=true;document.getElementById('save-status').textContent='Unsaved changes';document.getElementById('save-status').style.color='#E8C17A'}

async function saveAll(){
  collectFormData();var json=JSON.stringify({items:projects},null,2);
  try{var r=await fetch('projects.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:json});if(r.ok){dirty=false;showStatus('Saved!');renderSidebar();return}}catch(e){}
  downloadJSON();showStatus('Downloaded — replace projects.json with the downloaded file');
}

function downloadJSON(){collectFormData();var json=JSON.stringify({items:projects},null,2);var blob=new Blob([json],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='projects.json';a.click();URL.revokeObjectURL(url);showStatus('Downloaded projects.json')}

function showStatus(msg){var el=document.getElementById('save-status');el.textContent=msg;el.style.color='#7AE8C1';
  setTimeout(function(){if(el.textContent===msg){el.textContent=dirty?'Unsaved changes':'';el.style.color='var(--dim)'}},3000)}

function addNewProject(){document.getElementById('new-modal').classList.add('open');document.getElementById('new-title').value='';document.getElementById('new-title').focus()}
function closeModal(){document.getElementById('new-modal').classList.remove('open')}

function confirmNewProject(){
  var title=document.getElementById('new-title').value.trim();var mode=document.getElementById('new-mode').value;if(!title){alert('Enter a title');return}
  var slug=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  projects.push({mode:mode,slug:slug,title:title,subtitle:null,desc:'',tags:[],awards:[],gallery:[],year:new Date().getFullYear(),link:null,whisper:null,wip:true,previewImage:null,coverImage:null,previewVideo:null});
  closeModal();markDirty();renderSidebar();selectProject(projects.length-1);
}

function deleteProject(){if(selectedIdx<0)return;var p=projects[selectedIdx];
  if(!confirm('Delete "'+p.title+'"?'))return;projects.splice(selectedIdx,1);selectedIdx=-1;markDirty();renderSidebar();
  document.getElementById('editor-form').style.display='none';document.getElementById('empty-state').style.display='flex';document.getElementById('btn-bar').style.display='none'}

window.addEventListener('beforeunload',function(e){if(dirty){e.preventDefault();e.returnValue=''}});

// ═══════════════════════════════════════════════════════════
// BLOCK EDITOR
// ═══════════════════════════════════════════════════════════
const BLOCK_TYPES={
  text:{icon:'¶',label:'Text',default:function(){return{type:'text',content:'',style:'body'}}},
  image:{icon:'▢',label:'Image',default:function(){return{type:'image',src:'',caption:'',size:'full'}}},
  'image-pair':{icon:'▢▢',label:'Image Pair',default:function(){return{type:'image-pair',left:{src:'',caption:''},right:{src:'',caption:''}}}},
  gallery:{icon:'⊞',label:'Gallery',default:function(){return{type:'gallery',items:[],columns:3}}},
  video:{icon:'▶',label:'Video',default:function(){return{type:'video',src:'',size:'full'}}},
  tags:{icon:'#',label:'Tags',default:function(){return{type:'tags'}}},
  spacer:{icon:'━',label:'Spacer',default:function(){return{type:'spacer',size:'medium'}}}
};

function renderBlocksEditor(p){
  var section=document.getElementById('blocks-section');if(!section)return;
  if(!p.blocks)p.blocks=[];
  var html='';
  // Convert button if no blocks yet
  if(!p.blocks.length){
    html+='<div class="blocks-empty">No layout blocks yet. The project page will use default rendering (description → cover → gallery → tags).<br>Click below to convert the existing content into editable blocks, or add blocks one at a time.</div>';
    html+='<button class="convert-btn" onclick="convertToBlocks()">↻ Convert current content to blocks</button>';
  }
  // Block list
  html+='<div class="blocks-wrap" id="blocks-wrap">';
  p.blocks.forEach(function(b,i){html+=renderBlockCard(b,i)});
  html+='</div>';
  // Add block bar
  html+='<div class="add-block-bar">';
  html+='<span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;align-self:center;margin-right:4px">+ Add</span>';
  Object.keys(BLOCK_TYPES).forEach(function(t){
    var bt=BLOCK_TYPES[t];
    html+='<button class="add-block-btn" onclick="addBlock(\''+t+'\')"><span class="block-icon t-'+t+'" style="width:18px;height:18px;font-size:11px">'+bt.icon+'</span>'+bt.label+'</button>';
  });
  html+='</div>';
  section.innerHTML=html;
  attachDragHandlers();
}

function renderBlockCard(b,i){
  var bt=BLOCK_TYPES[b.type]||{icon:'?',label:b.type};
  var html='<div class="block-card" draggable="true" data-idx="'+i+'">';
  html+='<div class="block-head">';
  html+='<div class="block-icon t-'+b.type+'">'+bt.icon+'</div>';
  html+='<div class="block-label">'+bt.label+'</div>';
  html+='<div class="block-controls">';
  html+='<button class="block-btn" onclick="moveBlock('+i+',-1)" title="Move up">↑</button>';
  html+='<button class="block-btn" onclick="moveBlock('+i+',1)" title="Move down">↓</button>';
  html+='<button class="block-btn del" onclick="deleteBlock('+i+')" title="Delete">✕</button>';
  html+='</div></div>';
  html+='<div class="block-body">';
  // Body editor based on type
  if(b.type==='text'){
    html+='<textarea oninput="updateBlock('+i+',\'content\',this.value)" placeholder="Text content (use blank line for new paragraph)">'+esc(b.content||'')+'</textarea>';
    html+='<div class="block-fields-row"><label>Style:</label>';
    html+='<select onchange="updateBlock('+i+',\'style\',this.value)">';
    ['body','intro','quote'].forEach(function(s){html+='<option value="'+s+'"'+(b.style===s?' selected':'')+'>'+s+'</option>'});
    html+='</select></div>';
  }
  else if(b.type==='image'){
    html+='<div class="block-img-pick">';
    html+='<img src="'+esc(b.src||'')+'" onerror="this.style.opacity=.2">';
    html+='<input type="text" value="'+esc(b.src||'')+'" placeholder="image path (e.g. assets/projects/slug/01.jpg)" oninput="updateBlock('+i+',\'src\',this.value);this.previousElementSibling.src=this.value">';
    html+='</div>';
    html+='<input type="text" value="'+esc(b.caption||'')+'" placeholder="caption (optional)" oninput="updateBlock('+i+',\'caption\',this.value)">';
    html+='<div class="block-fields-row"><label>Size:</label>';
    html+='<select onchange="updateBlock('+i+',\'size\',this.value)">';
    ['full','wide','half','third'].forEach(function(s){html+='<option value="'+s+'"'+(b.size===s?' selected':'')+'>'+s+'</option>'});
    html+='</select></div>';
  }
  else if(b.type==='image-pair'){
    html+='<div class="block-pair-grid">';
    ['left','right'].forEach(function(side){
      var item=b[side]||{};
      html+='<div class="pair-side"><div class="pair-label">'+side+'</div>';
      html+='<input type="text" value="'+esc(item.src||'')+'" placeholder="path" oninput="updatePairSide('+i+',\''+side+'\',\'src\',this.value)">';
      html+='<input type="text" value="'+esc(item.caption||'')+'" placeholder="caption" oninput="updatePairSide('+i+',\''+side+'\',\'caption\',this.value)">';
      html+='</div>';
    });
    html+='</div>';
  }
  else if(b.type==='gallery'){
    html+='<div class="block-gallery-list" id="gallery-list-'+i+'">';
    (b.items||[]).forEach(function(it,gi){
      var src=typeof it==='string'?it:(it.src||'');
      html+='<div class="block-gallery-row"><img src="'+esc(src)+'" onerror="this.style.opacity=.2">';
      html+='<input type="text" value="'+esc(src)+'" placeholder="image path" oninput="updateGalleryItem('+i+','+gi+',this.value);this.previousElementSibling.src=this.value">';
      html+='<button class="gal-rm" onclick="removeGalleryItem('+i+','+gi+')">✕</button></div>';
    });
    html+='</div>';
    html+='<button class="add-block-btn" onclick="addGalleryItem('+i+')" style="font-size:10px;padding:5px 10px">+ Add image</button>';
    html+='<div class="block-fields-row"><label>Columns:</label>';
    html+='<select onchange="updateBlock('+i+',\'columns\',parseInt(this.value))">';
    [2,3,4].forEach(function(c){html+='<option value="'+c+'"'+(b.columns===c?' selected':'')+'>'+c+'</option>'});
    html+='</select></div>';
  }
  else if(b.type==='video'){
    html+='<input type="text" value="'+esc(b.src||'')+'" placeholder="video path (e.g. assets/projects/slug/loop.mp4)" oninput="updateBlock('+i+',\'src\',this.value)">';
    html+='<div class="block-fields-row"><label>Size:</label>';
    html+='<select onchange="updateBlock('+i+',\'size\',this.value)">';
    ['full','wide'].forEach(function(s){html+='<option value="'+s+'"'+(b.size===s?' selected':'')+'>'+s+'</option>'});
    html+='</select></div>';
  }
  else if(b.type==='tags'){
    html+='<div style="font-size:11px;color:var(--dim);padding:6px 0">Renders the project tags from the Tags section above.</div>';
  }
  else if(b.type==='spacer'){
    html+='<div class="block-fields-row"><label>Size:</label>';
    html+='<select onchange="updateBlock('+i+',\'size\',this.value)">';
    ['small','medium','large'].forEach(function(s){html+='<option value="'+s+'"'+(b.size===s?' selected':'')+'>'+s+'</option>'});
    html+='</select></div>';
  }
  html+='</div></div>';
  return html;
}

function addBlock(type){
  if(selectedIdx<0)return;
  var p=projects[selectedIdx];
  if(!p.blocks)p.blocks=[];
  p.blocks.push(BLOCK_TYPES[type].default());
  markDirty();renderBlocksEditor(p);
}

function deleteBlock(i){
  var p=projects[selectedIdx];
  if(!confirm('Delete this '+p.blocks[i].type+' block?'))return;
  p.blocks.splice(i,1);
  markDirty();renderBlocksEditor(p);
}

function moveBlock(i,delta){
  var p=projects[selectedIdx];
  var ni=i+delta;
  if(ni<0||ni>=p.blocks.length)return;
  var tmp=p.blocks[i];p.blocks[i]=p.blocks[ni];p.blocks[ni]=tmp;
  markDirty();renderBlocksEditor(p);
}

function updateBlock(i,key,val){
  var p=projects[selectedIdx];
  p.blocks[i][key]=val;markDirty();
}

function updatePairSide(i,side,key,val){
  var p=projects[selectedIdx];
  if(!p.blocks[i][side])p.blocks[i][side]={};
  p.blocks[i][side][key]=val;markDirty();
}

function updateGalleryItem(i,gi,val){
  var p=projects[selectedIdx];
  if(!p.blocks[i].items)p.blocks[i].items=[];
  // Store as string for simplicity
  p.blocks[i].items[gi]=val;markDirty();
}

function addGalleryItem(i){
  var p=projects[selectedIdx];
  if(!p.blocks[i].items)p.blocks[i].items=[];
  p.blocks[i].items.push('');
  markDirty();renderBlocksEditor(p);
}

function removeGalleryItem(i,gi){
  var p=projects[selectedIdx];
  p.blocks[i].items.splice(gi,1);
  markDirty();renderBlocksEditor(p);
}

function convertToBlocks(){
  var p=projects[selectedIdx];
  if(p.blocks&&p.blocks.length){if(!confirm('Replace existing blocks?'))return}
  var blocks=[];
  // 1. Cover/preview image first
  if(p.coverImage||p.previewImage){
    blocks.push({type:'image',src:p.coverImage||p.previewImage,caption:'',size:'full'});
  }
  // 2. Description as text
  if(p.desc){
    blocks.push({type:'text',content:p.desc,style:'body'});
  }
  // 3. Gallery items in pairs
  if(p.gallery&&p.gallery.length){
    var items=p.gallery.map(function(g){return typeof g==='string'?g:(g.src||g.gallery||'')}).filter(Boolean);
    // Pair them up
    for(var i=0;i<items.length;i+=2){
      if(i+1<items.length){
        blocks.push({type:'image-pair',left:{src:items[i],caption:''},right:{src:items[i+1],caption:''}});
      }else{
        blocks.push({type:'image',src:items[i],caption:'',size:'full'});
      }
    }
  }
  // 4. Tags last
  if(p.tags&&p.tags.length){
    blocks.push({type:'tags'});
  }
  p.blocks=blocks;
  markDirty();renderBlocksEditor(p);
}

// Drag-and-drop reorder
var dragSrcIdx=null;
function attachDragHandlers(){
  var cards=document.querySelectorAll('#blocks-wrap .block-card');
  cards.forEach(function(card){
    card.addEventListener('dragstart',function(e){
      dragSrcIdx=parseInt(card.dataset.idx);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',function(){
      card.classList.remove('dragging');
      cards.forEach(function(c){c.classList.remove('drag-over')});
    });
    card.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave',function(){card.classList.remove('drag-over')});
    card.addEventListener('drop',function(e){
      e.preventDefault();
      var dst=parseInt(card.dataset.idx);
      if(dragSrcIdx===null||dragSrcIdx===dst)return;
      var p=projects[selectedIdx];
      var moved=p.blocks.splice(dragSrcIdx,1)[0];
      p.blocks.splice(dst,0,moved);
      dragSrcIdx=null;
      markDirty();renderBlocksEditor(p);
    });
  });
}
</script>
